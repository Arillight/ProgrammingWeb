  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 마우스 올리면 메뉴 나오도록 함 */
    .dropdown:hover .dropdown-menu {
      display: block;
    }
    body{
      padding-top:100px;
      background:#f5f5f5;
    }

    .dropdown:hover .dropdown-menu {
      display: block;
    }

    .operator-container{
      position:relative;
      width:1000px;
      height:700px;
      margin:50px auto;
    }

    .box{
      position:absolute;
      border:2px solid black;
      background:white;
      text-align:center;
      padding:20px;
      font-size:32px;
      min-width: 180px;
    }

    /* 중앙 박스 */
    .center{
      top:260px;
      left:400px;
      width:260px;
      height:110px;
      line-height:60px;
      font-size:40px;
    }

    /* 주변 박스 */
    .minus2{
      top:20px;
      left:120px;
      width:240px;
    }

    .plus{
      top:60px;
      left:470px;
    }

    .minus{
      top:50px;
      right:80px;
    }

    .multiply{
      top:330px;
      right:40px;
    }

    .divide{
      bottom:40px;
      right:180px;
    }
    /*나머지*/
    .mod{
      bottom:20px;
      left:300px;
      width:180px;
    }

    .increase{
      top:340px;
      left:50px;
      width: 210px;
    }
    /* 선 */
    svg{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }
  </style>
</head>

  <div class="operator-container">
    <!-- 연결선 -->
    <svg>
      <!-- 1: 왼쪽 위로 올라가는 대각선 (북서쪽) -->
      <line x1="450" y1="260" x2="240" y2="160" stroke="black" stroke-width="3"/>
      <!-- 2: 위쪽으로 올라가는 수직선 (북쪽) -->
      <line x1="530" y1="260" x2="530" y2="150" stroke="black" stroke-width="3"/>
      <!-- 3: 오른쪽 위로 올라가는 대각선 (북동쪽) -->
      <line x1="660" y1="270" x2="800" y2="150" stroke="black" stroke-width="3"/>
      <!-- 4: 오른쪽 아래로 내려가는 대각선 (남동쪽) -->
      <line x1="660" y1="350" x2="880" y2="410" stroke="black" stroke-width="3"/>
      <!-- 5: 오른쪽 아래로 내려가는 대각선 (남동쪽 더 아래) -->
      <line x1="600" y1="370" x2="650" y2="590" stroke="black" stroke-width="3"/>
      <!-- 6: 왼쪽 아래로 내려가는 대각선 (오른쪽 위 → 왼쪽 아래) -->
      <line x1="470" y1="370" x2="420" y2="590" stroke="black" stroke-width="3"/>
      <!-- 7: 왼쪽으로 거의 수평 이동 (오른쪽 → 왼쪽) -->
      <line x1="400" y1="340" x2="260" y2="390" stroke="black" stroke-width="3"/>
    </svg>
    <!-- 중앙 -->
    <div class="box center">산술연산자</div>
    <!-- 주변 -->
    <div class="box minus2">감소연산자<br>(--)</div>
    <div class="box plus">덧셈<br>(+)</div>
    <div class="box minus">뺄셈<br>(-)</div>
    <div class="box multiply">곱셈<br>(*)</div>
    <div class="box divide">나눗셈<br>(/)</div>
    <div class="box mod">나머지<br>(%)</div>
    <div class="box increase">증가연산자<br>(++)</div>
  </div>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 마우스 올리면 메뉴 나오도록 함 */
    .dropdown:hover .dropdown-menu {
      display: block;
    }

    body{
      padding-top: 80px;
      background-color: #f3f3f3;
    }

    /* 접수 안내 영역 */
    .apply-section{
      min-height: 80vh;
      display: flex;
      align-items: center;
    }
    .apply-image img{
      width: 100%;
      max-width: 800px;
    }
    .apply-title{
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 50px;
    }
    .step-item{
      display: flex;
      align-items: flex-start;
      margin-bottom: 35px;
    }
    .step-line{
      width: 5px;
      height: 60px;
      background: #d9d9d9;
      margin-right: 25px;
      border-radius: 10px;
    }
    .step-item:first-child .step-line{
      background: linear-gradient(to bottom, #56c5ff, #7a4dff);
    }
    .step-text{
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.6;
    }
    @media(max-width:992px){
      .apply-title{
        font-size: 2rem;
        margin-top: 40px;
      }
      .step-text{
        font-size: 1.1rem;
      }
    }
  </style>

    <div class="container">
      <div class="row align-items-center">

        <!-- 왼쪽 이미지 -->
        <div class="col-lg-7 text-center apply-image">
          <img src="https://www.image2url.com/r2/default/images/1781609671964-b52309db-decb-4bd2-90f0-f09eb56864bd.png">
        </div>

        <!-- 오른쪽 설명 -->
        <div class="col-lg-5">
          <h1 class="apply-title">시험 접수 방식</h1>

          <div class="step-item">
            <div class="step-line"></div>
            <div class="step-text">
              1. q-net이라고 검색한 후 사이트에 접속한다.
            </div>
          </div>

          <div class="step-item">
            <div class="step-line"></div>
            <div class="step-text">
              2. 회원가입 및 로그인을 하기
            </div>
          </div>

          <div class="step-item">
            <div class="step-line"></div>
            <div class="step-text">
              3. 국가자격시험 → 원서접수 신청 순서로 들어가기
            </div>
          </div>

          <div class="step-item">
            <div class="step-line"></div>
            <div class="step-text">
              4. 응시종목 선택 후 시험 날짜와 장소 정하기
            </div>
          </div>

          <div class="step-item">
            <div class="step-line"></div>
            <div class="step-text">
              5. 가상계좌로 결재하기
            </div>
          </div>
        </div>
      </div>
